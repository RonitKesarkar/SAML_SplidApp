{% extends "base.html" %}
{% block  body %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Split It!</a>
      <a href="/back_to_group/{{group.id}}" type="button" class="btn btn-dark btn-sm mx-1">Back</a>
    </div>
  </nav>
  <div class="container mt-3">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>
<div class="container my-3">
  <h2>Member Details:</h2>
  <form action="/update_member/{{member.id}}" method="POST">
    <div class="mb-3">
      <label for="name" class="form-label">Member Name</label>
      <input type="text" class="form-control" name="name" id="name" value="{{member.name}}" required>
        <label class="form-label mt-2">Expense: {{member.expense}}</label>
        <br>
        <label class="form-label">Balance: {{member.balance}}</label>
    </div>
  <button type="submit" class="btn btn-dark">Update</button>
  </form>
</div>
{% endblock  body %}
